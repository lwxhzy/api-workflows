name: Sync Apifox (Reusable)

on:
  workflow_call:
    inputs:
      setup-command:
        description: "Command to install project dependencies"
        required: true
        type: string
      export-command:
        description: "Command to export OpenAPI spec to openapi.json"
        required: true
        type: string
    secrets:
      APIFOX_ACCESS_TOKEN:
        required: true
      APIFOX_PROJECT_ID:
        required: true
      FEISHU_WEBHOOK:
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ inputs.setup-command }}

      - name: Export OpenAPI spec
        run: ${{ inputs.export-command }}

      # ── Spec 变更检测 ──
      - name: Compute spec hash
        id: spec-hash
        run: |
          HASH=$(sha256sum openapi.json | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Spec hash: $HASH"

      - name: Check cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .spec-hash-marker
          key: apifox-spec-${{ steps.spec-hash.outputs.hash }}

      - name: Spec unchanged
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "OpenAPI spec unchanged, skipping sync"

      # ── 同步到 Apifox ──
      - name: Sync to Apifox
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          RESPONSE=$(jq -n --arg spec "$(cat openapi.json)" '{
            input: $spec,
            options: {
              targetEndpointFolderId: 0,
              targetSchemaFolderId: 0,
              endpointOverwriteBehavior: "OVERWRITE_EXISTING",
              schemaOverwriteBehavior: "OVERWRITE_EXISTING",
              updateFolderOfChangedEndpoint: true,
              prependBasePath: false
            }
          }' | curl -s -w "\n%{http_code}" -X POST \
            "https://api.apifox.com/v1/projects/${{ secrets.APIFOX_PROJECT_ID }}/import-openapi" \
            -H "X-Apifox-Api-Version: 2024-03-28" \
            -H "Authorization: Bearer ${{ secrets.APIFOX_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @-)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Apifox sync failed with HTTP $HTTP_CODE: $BODY"
            exit 1
          fi

          echo "${{ steps.spec-hash.outputs.hash }}" > .spec-hash-marker
          echo "Sync completed successfully"

      # ── 飞书通知 ──
      - name: Notify Feishu (success)
        if: success() && steps.cache.outputs.cache-hit != 'true' && env.FEISHU_WEBHOOK != ''
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg ref "${{ github.ref_name }}" \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: { tag: "plain_text", content: "Apifox 同步成功" },
                  template: "green"
                },
                elements: [
                  {
                    tag: "div",
                    text: {
                      tag: "lark_md",
                      content: "**仓库**：\($repo)\n**分支**：\($ref)\n**提交**：\($sha | .[:8])\n**操作人**：\($actor)"
                    }
                  },
                  {
                    tag: "action",
                    actions: [{
                      tag: "button",
                      text: { tag: "plain_text", content: "查看详情" },
                      url: $url,
                      type: "primary"
                    }]
                  }
                ]
              }
            }')"

      - name: Notify Feishu (failure)
        if: failure() && env.FEISHU_WEBHOOK != ''
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg ref "${{ github.ref_name }}" \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: { tag: "plain_text", content: "Apifox 同步失败" },
                  template: "red"
                },
                elements: [
                  {
                    tag: "div",
                    text: {
                      tag: "lark_md",
                      content: "**仓库**：\($repo)\n**分支**：\($ref)\n**提交**：\($sha | .[:8])\n**操作人**：\($actor)"
                    }
                  },
                  {
                    tag: "action",
                    actions: [{
                      tag: "button",
                      text: { tag: "plain_text", content: "查看详情" },
                      url: $url,
                      type: "danger"
                    }]
                  }
                ]
              }
            }')"
